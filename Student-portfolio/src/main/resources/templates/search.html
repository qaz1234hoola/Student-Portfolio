<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Students</title>
</head>
<body>

    <h2>Search Student Portfolios</h2>

    <p>
        Logged in as:
        <span th:text="${userEmail}"></span>
    </p>

    <hr>

    <form action="/search" method="get">
        <input type="text" name="keyword" placeholder="Enter keyword to search" th:value="${keyword}" required />
        <button type="submit">Search</button>
    </form>

    <hr>

    <h3>Search Results</h3>

    <div th:if="${keyword == null}">
        <p>Enter a keyword to search student portfolios.</p>
    </div>

    <div th:if="${keyword != null and #lists.isEmpty(results)}">
        <p>No matching portfolios found.</p>
    </div>

    <div th:each="portfolio : ${results}">
        <h4>Student Portfolio</h4>
        <p><strong>Bio:</strong> <span th:text="${portfolio.bio}"></span></p>
        <hr>
    </div>

    <br><br>
    <a href="/dashboard">Go to Dashboard</a>
    <br><br>
    <a href="/portfolio">My Portfolio</a>

</body>
</html>
